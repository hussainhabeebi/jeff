/* ── Doctor Selector ── */
.doctors-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:40px}

.slot-appt.selected{background:var(--purple);color:white;border-color:var(--purple)}

<div class="avail-leg-item"><div class="avail-leg-dot" style="background:rgba(124,58,237,.3)"></div> By Appointment Only</div>

function getWeekDates(){
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((dow+6)%7));
  return Array.from({length:7},(_,i)=>{
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    return d;
  });
}

function isTodayCol(dayIndex){
  const today = new Date();
  const dow = today.getDay();
  const todayMonIndex = (dow+6)%7;
  return dayIndex === todayMonIndex;
}
