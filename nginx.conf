server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/html text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Images & video — cache 1 year
    location ~* \.(jpg|jpeg|png|webp|gif|svg|ico|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        try_files $uri =404;
    }

    # CSS & JS — cache 1 month
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, must-revalidate";
        add_header Vary Accept-Encoding;
        try_files $uri =404;
    }

    # Fonts — cache 1 year
    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        try_files $uri =404;
    }

    # HTML — short cache, always revalidate
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri $uri/ =404;
    }

    # WordPress-style clean URLs — serve index.html from directory
    # Also handles /index.php/{slug}/ WordPress permalink structure
    location / {
        try_files $uri $uri/ $uri/index.html =404;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Explicit support for /index.php/{slug}/ WordPress permalinks
    location ~ ^/index\.php/(.+)$ {
        try_files /index.php/$1/index.html /index.php/$1 =404;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Redirect 404 to home page
    error_page 404 /index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
